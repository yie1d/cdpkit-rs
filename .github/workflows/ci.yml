name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-build-test-clippy:
    name: Fmt Build Test Clippy Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build --examples
        run: cargo build --workspace --examples

  msrv:
    name: MSRV Rust 1.75
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.75.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.75.0

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build --examples
        run: cargo build --workspace --examples

  codegen-stability:
    name: Codegen Stability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Verify generated protocol is stable
        run: |
          cargo run -p cdpkit_codegen
          git diff --exit-code -- cdpkit/src/protocol.rs
          first_hash="$(sha256sum cdpkit/src/protocol.rs | cut -d' ' -f1)"
          cargo run -p cdpkit_codegen
          second_hash="$(sha256sum cdpkit/src/protocol.rs | cut -d' ' -f1)"
          test "$first_hash" = "$second_hash"
          git diff --exit-code -- cdpkit/src/protocol.rs
