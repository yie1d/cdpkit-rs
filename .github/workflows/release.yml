name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.4.1)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
      version: ${{ steps.resolve.outputs.version }}
      commit: ${{ steps.resolve.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve and verify tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Invalid tag format: $TAG"
              exit 1
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          git fetch --force --tags origin

          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "::error::Remote tag does not exist: $TAG"
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag was not fetched locally: $TAG"
            exit 1
          fi

          TAG_COMMIT="$(git rev-list -n 1 "$TAG^{commit}")"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [ "$HEAD_COMMIT" != "$TAG_COMMIT" ]; then
            echo "::error::Checked-out HEAD ($HEAD_COMMIT) does not match tag $TAG commit ($TAG_COMMIT)"
            exit 1
          fi

          VERSION="${TAG#v}"
          CARGO_VERSION="$(awk '/^\[workspace.package\]/{in_section=1; next} /^\[/{in_section=0} in_section && /^version = / {gsub(/"/,"",$3); print $3; exit}' Cargo.toml)"
          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Failed to read workspace.package.version from Cargo.toml"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, tag=$VERSION"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$TAG_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG at commit $TAG_COMMIT (version $VERSION)"

  test:
    name: Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.ref }}
          fetch-depth: 0

      - name: Verify checked-out commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ needs.validate.outputs.commit }}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  publish:
    name: Publish to crates.io
    needs: [validate, test]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.ref }}
          fetch-depth: 0

      - name: Verify checked-out commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ needs.validate.outputs.commit }}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish -p cdpkit
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  extract-notes:
    name: Extract release notes
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.ref }}
          fetch-depth: 0

      - name: Verify checked-out commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ needs.validate.outputs.commit }}"

      - name: Extract section from CHANGELOG.md
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate.outputs.version }}"
          NOTES="$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)"
          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog entry found for $VERSION, using fallback"
            NOTES="See CHANGELOG.md in tag ${{ needs.validate.outputs.tag }} for details."
          fi
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Create GitHub Release
    needs: [validate, publish, extract-notes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.ref }}
          fetch-depth: 0

      - name: Verify checked-out commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ needs.validate.outputs.commit }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: "cdpkit ${{ needs.validate.outputs.tag }}"
          body: ${{ needs.extract-notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.tag, '-') }}
