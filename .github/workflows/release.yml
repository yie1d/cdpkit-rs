name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.5.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
      version: ${{ steps.resolve.outputs.version }}
      commit: ${{ steps.resolve.outputs.commit }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and verify tag
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
          TRIGGER_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$REQUESTED_TAG"
          else
            TAG="${TRIGGER_REF#refs/tags/}"
          fi

          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::Invalid tag format"
            exit 1
          fi

          git fetch --force --no-tags origin "refs/tags/$TAG:refs/tags/$TAG"
          TAG_COMMIT="$(git rev-list -n 1 "$TAG^{commit}")"
          git checkout --detach "$TAG_COMMIT"

          VERSION="${TAG#v}"
          CARGO_VERSION="$(awk '/^\[workspace.package\]/{in_section=1; next} /^\[/{in_section=0} in_section && /^version = / {gsub(/"/,"",$3); print $3; exit}' Cargo.toml)"
          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Failed to read workspace.package.version from Cargo.toml"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, tag=$VERSION"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$TAG_COMMIT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$TAG_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Validated release tag at commit $TAG_COMMIT"

  verify:
    name: Run CI release gates
    needs: validate
    uses: ./.github/workflows/ci.yml
    with:
      checkout_ref: ${{ needs.validate.outputs.ref }}
      expected_commit: ${{ needs.validate.outputs.commit }}

  publish:
    name: Publish to crates.io
    needs: [validate, verify]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.ref }}
          persist-credentials: false

      - name: Verify checked-out commit
        env:
          EXPECTED_COMMIT: ${{ needs.validate.outputs.commit }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Publish
        run: cargo publish -p cdpkit --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  extract-notes:
    name: Extract release notes
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.ref }}
          persist-credentials: false

      - name: Verify checked-out commit
        env:
          EXPECTED_COMMIT: ${{ needs.validate.outputs.commit }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"

      - name: Extract section from CHANGELOG.md
        id: extract
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          NOTES="$(awk -v version="$VERSION" '$0 == "## [" version "]" || index($0, "## [" version "] - ") == 1 {found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)"
          if [ -z "$NOTES" ]; then
            echo "::error::No changelog entry found for $VERSION"
            exit 1
          fi
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Create GitHub Release
    needs: [validate, publish, extract-notes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.ref }}
          persist-credentials: false

      - name: Verify checked-out commit
        env:
          EXPECTED_COMMIT: ${{ needs.validate.outputs.commit }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: "cdpkit ${{ needs.validate.outputs.tag }}"
          body: ${{ needs.extract-notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.tag, '-') }}
